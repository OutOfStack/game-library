name: "Test, build and push image, deploy"

on: [push]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11

    - name: Run tests
      run: go test -race -vet=off ./...

    - name: Run tests with coverage
      run: go test -cover -coverpkg=./... -coverprofile=coverage.out ./...

    - name: Show tests coverage
      run: go tool cover -func=coverage.out

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        fail_ci_if_error: false

  release:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref_name == 'main' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_output.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: false

    - name: Install svu
      run: |
        go install github.com/caarlos0/svu/v3@v3.4.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Create release tag
      id: release_output
      run: |
        set -euo pipefail

        if ! git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 >/dev/null 2>&1; then
          echo "::notice::No SemVer baseline tag found. Push v1.0.0 manually to enable automatic versioning."
          exit 0
        fi

        next="$(svu next)"
        [ "$next" = "$(svu current)" ] && exit 0

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag "$next"
        git push origin "$next"
        echo "version=$next" >> "$GITHUB_OUTPUT"

  image_build_push:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ github.ref_name == 'main' }}
    outputs:
      image_tag: ${{ steps.image_tag.outputs.image_tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Select image tag
      id: image_tag
      run: |
        if [ -n "${{ needs.release.outputs.version }}" ]; then
          echo "image_tag=${{ needs.release.outputs.version }}" >> "$GITHUB_OUTPUT"
        else
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: |
          asctod/game-library:latest
          asctod/game-library:${{ steps.image_tag.outputs.image_tag }}
          asctod/game-library:${{ github.sha }}
        build-args: |
          APP_VERSION=${{ steps.image_tag.outputs.image_tag }}
          APP_COMMIT=${{ github.sha }}
        cache-from: type=registry,ref=asctod/game-library:latest
        cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: image_build_push
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Kubernetes Set Context
      uses: Azure/k8s-set-context@v4
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.K8S_CLUSTER_CONFIG }}

    - name: Replace deployment variables
      run: |
        sed -i'' \
        -e 's/_K8S_URL_/${{ secrets.K8S_URL }}/g' \
        -e 's/_K8S_IP_/${{ secrets.K8S_IP }}/g' \
        -e 's/_IMAGE_TAG_/${{ needs.image_build_push.outputs.image_tag }}/g' \
        -e 's/_UI_URL_/${{ vars.UI_URL }}/g' \
        .k8s/*.yaml

    - name: Diff changes
      run: |
        kubectl diff -f .k8s/config.yaml || true
        kubectl diff -f .k8s/deployment.yaml || true
        kubectl diff -f .k8s/service.yaml || true
        kubectl diff -f .k8s/ingress.yaml || true

    - name: Kubernetes Apply configs
      run: |
        kubectl apply -f .k8s/config.yaml
        kubectl apply -f .k8s/deployment.yaml
        kubectl apply -f .k8s/service.yaml
        kubectl apply -f .k8s/ingress.yaml
