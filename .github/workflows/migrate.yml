name: Apply migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: true

    - name: Apply migrations
      run: DB_DSN=${{ secrets.DB_DSN }} go run ./cmd/game-library-manage/. migrate
