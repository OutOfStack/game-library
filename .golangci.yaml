version: "2"
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - decorder
    - dogsled
    - dupword
    - durationcheck
    - errname
    - exhaustive
    - fatcontext
    - forcetypeassert
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - grouper
    - importas
    - inamedparam
    - intrange
    - loggercheck
    - makezero
    - mirror
    - misspell
    - modernize
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - zerologlint
  settings:
    errcheck:
      exclude-functions:
        - (*encoding/json.Decoder).Decode
    goconst:
      min-len: 3
      min-occurrences: 3
    govet:
      enable:
        - shadow
    perfsprint:
      errorf: false
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        rules:
        linters:
          - gocyclo
          - errcheck
          - dupl
          - wsl
          - goconst
      - path: _test\.go
        linters:
          - gosec
        text: "G101|G115|G705" # fake credentials, integer overflow, and XSS false positives in tests
      - path: "pkg/types/|internal/api/"
        linters:
          - revive
        text: "var-naming"
      - linters:
          - revive # disable "should have a package comment"
        text: "package comment"
      - linters:
          - gosec
        text: "G704" # SSRF taint analysis - URLs are config-controlled, not user input
      - linters:
          - gosec
        text: "G117" # config struct fields named after secrets are not actual secrets
    paths:
      - docs
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - docs
      - examples$
